apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: synthetics-agent-smoke-check
parameters:
  - name: AGENT_URL
    required: true
    description: Synthetics Agent metrics URL (e.g. http://synthetics-agent.rhobs-int.svc:8080)
  - name: THANOS_URL
    required: true
    description: Internal Thanos query endpoint (e.g. http://thanos-query-rhobs.rhobs-int.svc:9090)
  - name: JOBID
    generate: expression
    from: "[0-9a-z]{7}"
  - name: IMAGE_TAG
    value: ""
    required: true
objects:
  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: synthetics-agent-smoke-${IMAGE_TAG}-${JOBID}
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      template:
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          containers:
            - name: smoke-check
              image: quay.io/openshift/origin-tools:latest
              command:
                - /bin/bash
                - -ceu
                - |
                  FAILURES=0
                  log() { echo "$(date +%H:%M:%S) $*"; }

                  log "Synthetics Agent smoke check"
                  log "  Agent URL: ${AGENT_URL}"
                  log "  Thanos URL: ${THANOS_URL}"
                  echo ""

                  log "--- Agent Metrics Endpoint ---"
                  METRICS=$(curl -sfSL --retry 3 --retry-delay 5 --max-time 10 "${AGENT_URL}/metrics" 2>/dev/null)
                  if [[ -z "$METRICS" ]]; then
                    log "FAIL  /metrics: no response"
                    FAILURES=$((FAILURES + 1))
                  else
                    if echo "$METRICS" | grep -q "synthetics_agent"; then
                      log "PASS  /metrics: agent metrics present"
                    else
                      log "WARN  /metrics: responding but no synthetics_agent metrics"
                    fi
                  fi

                  echo ""
                  log "--- Probe Data Flowing (Thanos) ---"
                  PROBE_RESULT=$(curl -sfSL --retry 3 --retry-delay 5 --max-time 10 \
                    "${THANOS_URL}/api/v1/query" \
                    --data-urlencode "query=count(probe_success)" 2>/dev/null)
                  PROBE_COUNT=$(echo "$PROBE_RESULT" | jq -r '.data.result[0].value[1] // "0"')
                  if [[ "$PROBE_COUNT" == "0" ]]; then
                    log "WARN  probe_success: no data (may be expected on small cells)"
                  else
                    log "PASS  probe_success: $(printf '%.0f' "$PROBE_COUNT") series"
                  fi

                  echo ""
                  log "--- Probe Data Freshness ---"
                  FRESH_RESULT=$(curl -sfSL --retry 3 --retry-delay 5 --max-time 10 \
                    "${THANOS_URL}/api/v1/query" \
                    --data-urlencode "query=count(probe_success{} unless probe_success{} offset 10m)" 2>/dev/null)
                  FRESH_COUNT=$(echo "$FRESH_RESULT" | jq -r '.data.result[0].value[1] // "0"')
                  if [[ "$PROBE_COUNT" != "0" && "$FRESH_COUNT" == "0" ]]; then
                    log "FAIL  probe freshness: data exists but no new samples in 10m"
                    FAILURES=$((FAILURES + 1))
                  elif [[ "$PROBE_COUNT" != "0" ]]; then
                    log "PASS  probe freshness: active data flowing"
                  fi

                  echo ""
                  if [[ $FAILURES -gt 0 ]]; then
                    log "FAILED: $FAILURES check(s) failed"
                    exit 1
                  fi
                  log "PASSED: all checks passed"
              env:
                - name: AGENT_URL
                  value: ${AGENT_URL}
                - name: THANOS_URL
                  value: ${THANOS_URL}
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
